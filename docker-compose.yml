version: '3.9'

services:
  cejo:
    build: .
    container_name: cejo-ipam
    ports:
      - "5000:5000"
    environment:
      - DB_PATH=/data/cejo.db
      - CEJO_API_KEY=cejo-api-2024
      - PORT=5000
    volumes:
      - cejo_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  cejo_data:
    driver: local
